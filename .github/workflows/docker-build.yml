name: Build Game Server Docker Image

on:
  workflow_dispatch:
    inputs:
      port:
        description: 'Game server listening port'
        required: true
        default: '65432'
      enable_logging:
        description: 'Enable sending logs to a centralized server'
        type: boolean
        default: false
      logging_host:
        description: 'Log server address (if enabled)'
        required: false
      logging_port:
        description: 'Log server port (if enabled)'
        required: false
        default: '5000'
      image_tag:
        description: 'Version tag to build'
        type: choice
        options:
          - v0.9.3
          - v0.9.2
          - v0.9.1
          - v0.9.0
          - v0.8.0
          - v0.7.0
          - v0.6.0
          - v0.1.0
        default: 'v0.9.3'
      push_latest:
        description: 'Also tag as latest'
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/multiplayer-server:${{ github.event.inputs.image_tag }}
            ${{ github.event.inputs.push_latest == 'true' && format('ghcr.io/{0}/multiplayer-server:latest', github.repository_owner) || '' }}

      - name: Verify image and Show Run Command
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/multiplayer-server:${{ github.event.inputs.image_tag }}"
          echo "Image built and pushed successfully: $IMAGE"
          
          CMD="docker run -d -p ${{ github.event.inputs.port }}:${{ github.event.inputs.port }} $IMAGE --port ${{ github.event.inputs.port }}"
          
          if [ "${{ github.event.inputs.enable_logging }}" = "true" ]; then
            CMD="$CMD --logging-host ${{ github.event.inputs.logging_host }} --logging-port ${{ github.event.inputs.logging_port }}"
          fi
          
          echo "To run the server, use:"
          echo "$CMD"

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build wheels on ${{ matrix.os }}
    # Only run if the ref is a tag starting with 'v'
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Build wheel
        shell: bash
        run: |
          # Extract version from tag (remove 'v' prefix if present)
          VERSION=${GITHUB_REF_NAME#v}
          echo "Building version $VERSION"
          
          # Update version in pyproject.toml
          # We use python to safely update the toml file
          export VERSION
          python -c "
          import re, os
          version = os.environ.get('VERSION', '0.0.0')
          with open('pyproject.toml', 'r') as f:
              content = f.read()
          # Match version = \"X.Y.Z\" under [project]
          content = re.sub(r'(^version\s*=\s*\").*(\")', f'\\g<1>{version}\\g<2>', content, flags=re.MULTILINE)
          with open('pyproject.toml', 'w') as f:
              f.write(content)
          "
          
          uv build --wheel

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

  create-release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Junie CLI
        run: curl -fsSL https://raw.githubusercontent.com/JetBrains/junie/main/install.sh | bash

      - name: Generate Release Description with Junie
        env:
          JUNIE_API_KEY: ${{ secrets.JUNIE_API_KEY }}
        run: |
          # Get the previous tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 ${{ github.ref_name }}^ 2>/dev/null || echo "")
          
          if [ -z "$PREVIOUS_TAG" ]; then
            TASK="Analyze the codebase and generate a descriptive release text in English for the first release ${{ github.ref_name }}. Focus on the main features and purpose of the project."
          else
            TASK="Analyze the commits between $PREVIOUS_TAG and ${{ github.ref_name }}. Generate a descriptive release text in English summarizing the changes, new features, and bug fixes."
          fi
          
          # Run Junie to generate the description
          # Use --non-interactive to avoid prompts
          # Use --brave-mode to allow Junie to explore the repo
          junie --task "$TASK" --output-format text --non-interactive --brave-mode > release_description.txt

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          body_path: release_description.txt
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}

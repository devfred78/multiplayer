name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build wheels on ${{ matrix.os }}
    # Only run if the ref is a tag starting with 'v'
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Build wheel
        shell: bash
        run: |
          # Extract version from tag (remove 'v' prefix if present)
          VERSION=${GITHUB_REF_NAME#v}
          echo "Building version $VERSION"
          
          # Update version in pyproject.toml
          # We use python to safely update the toml file
          export VERSION
          python -c "
          import re, os
          version = os.environ.get('VERSION', '0.0.0')
          with open('pyproject.toml', 'r') as f:
              content = f.read()
          # Match version = \"X.Y.Z\" under [project]
          content = re.sub(r'(^version\s*=\s*\").*(\")', f'\\g<1>{version}\\g<2>', content, flags=re.MULTILINE)
          with open('pyproject.toml', 'w') as f:
              f.write(content)
          "
          
          uv build --wheel

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

  create-release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Junie CLI
        run: curl -fsSL https://raw.githubusercontent.com/JetBrains/junie/main/install.sh | bash

      - name: Generate Release Description with Junie
        env:
          JUNIE_API_KEY: ${{ secrets.JUNIE_API_KEY }}
        run: |
          # Get the previous tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 ${{ github.ref_name }}^ 2>/dev/null || echo "")
          
          if [ -z "$PREVIOUS_TAG" ]; then
            TASK="Analyze the codebase and generate a descriptive release text in English for the first release ${{ github.ref_name }}. Focus on the main features and purpose of the project. OUTPUT ONLY the release description without any comments, code blocks, or tool execution logs."
          else
            TASK="Analyze the commits between $PREVIOUS_TAG and ${{ github.ref_name }}. Generate a descriptive release text in English summarizing the changes, new features, and bug fixes. OUTPUT ONLY the release description without any comments, code blocks, or tool execution logs."
          fi
          
          # Run Junie to generate the description
          # Use --auth with the API key
          # Use --output-format text
          # We use a temporary file to capture output and then extract only the last part if needed,
          # but normally --task should return the result.
          # To avoid junk characters and extra logs, we'll try to use a more specific prompt
          # and ensure we're not capturing the TTY artifacts if any.
          junie --auth "$JUNIE_API_KEY" --task "$TASK" --output-format text > raw_output.txt
          
          # Clean the output: Junie text output might contain the full trace.
          # We extract everything after "TASK RESULT:" if it exists, otherwise use the whole cleaned file.
          # Also, removing non-printable characters with tr.
          tr -cd '\11\12\15\40-\176' < raw_output.txt > cleaned_output.txt
          
          if grep -q "TASK RESULT:" cleaned_output.txt; then
            sed -n '/TASK RESULT:/,$p' cleaned_output.txt | sed '1d' > release_description.txt
          else
            cp cleaned_output.txt release_description.txt
          fi
          
          # Final check: if the file is still empty or too short, use a fallback
          if [ ! -s release_description.txt ]; then
             echo "Release $GITHUB_REF_NAME" > release_description.txt
          fi

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          body_path: release_description.txt
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}

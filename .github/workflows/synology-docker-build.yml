name: Build Synology-Compatible Docker Image

on:
  workflow_dispatch:
    inputs:
      port:
        description: 'Game server listening port'
        required: true
        default: '65432'
      server_name:
        description: 'Name of the game server'
        required: false
        default: 'Multiplayer Server'
      enable_logging:
        description: 'Enable sending logs to a centralized server'
        type: boolean
        default: false
      enable_tls:
        description: 'Enable TLS encryption (generates a self-signed certificate)'
        type: boolean
        default: false
      tls_domain:
        description: 'Domain name for TLS (if enabled, default is localhost)'
        required: false
        default: 'localhost'
      logging_host:
        description: 'Log server address (if enabled)'
        required: false
      logging_port:
        description: 'Log server port (if enabled)'
        required: false
        default: '5000'
      image_tag:
        description: 'Version tag to build (leave empty for latest)'
        required: false
        default: ''
      push_latest:
        description: 'Also tag as synology-latest'
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine image tag
        id: determine_tag
        run: |
          USER_TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$USER_TAG" ]; then
            # Read from config file if no tag provided
            LATEST_TAG=$(grep 'latest_tag:' .github/image-tags.yml | awk '{print $2}')
            echo "TAG=$LATEST_TAG" >> $GITHUB_OUTPUT
            echo "Using latest tag from config: $LATEST_TAG"
          else
            echo "TAG=$USER_TAG" >> $GITHUB_OUTPUT
            echo "Using user-provided tag: $USER_TAG"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.determine_tag.outputs.TAG }}
            type=raw,value=synology-latest,enable=${{ github.event.inputs.push_latest == 'true' }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Verify build and Show Run Command
        run: |
          IMAGE="ghcr.io/${{ github.repository }}:${{ steps.determine_tag.outputs.TAG }}"
          echo "Multi-arch image build and push completed."
          echo "Image: $IMAGE"
          
          CMD="docker run -d -p ${{ github.event.inputs.port }}:${{ github.event.inputs.port }} $IMAGE --port ${{ github.event.inputs.port }}"
          
          if [ "${{ github.event.inputs.server_name }}" != "" ]; then
            CMD="$CMD --name \"${{ github.event.inputs.server_name }}\""
          fi
          
          if [ "${{ github.event.inputs.enable_logging }}" = "true" ]; then
            CMD="$CMD --logging-host ${{ github.event.inputs.logging_host }} --logging-port ${{ github.event.inputs.logging_port }}"
          fi
          
          if [ "${{ github.event.inputs.enable_tls }}" = "true" ]; then
            CMD="$CMD --tls-self-signed --tls-domain ${{ github.event.inputs.tls_domain }}"
          fi
          
          echo "To run the server on your Synology NAS, pull the image and use:"
          echo "$CMD"

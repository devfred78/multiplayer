name: Build Synology-Compatible Docker Image

on:
  workflow_dispatch:
    inputs:
      port:
        description: 'Game server listening port'
        required: true
        default: '65432'
      enable_logging:
        description: 'Enable sending logs to a centralized server'
        type: boolean
        default: false
      logging_host:
        description: 'Log server address (if enabled)'
        required: false
      logging_port:
        description: 'Log server port (if enabled)'
        required: false
        default: '5000'
      image_tag:
        description: 'Docker image tag'
        required: true
        default: 'synology-latest'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false # Multi-arch images usually require a registry to push to, 'load: true' doesn't support multi-arch
          tags: multiplayer-server:${{ github.event.inputs.image_tag }}
          # Note: Since 'load: true' does not support multi-platform images, 
          # we just verify the build here. To use this on a NAS, 
          # one would normally push to a registry (like Docker Hub or GHCR) 
          # and pull from there on the Synology NAS.

      - name: Verify build and Show Run Command
        run: |
          echo "Multi-arch image build check (amd64, arm64) for tag: ${{ github.event.inputs.image_tag }} completed."
          
          CMD="docker run -d -p ${{ github.event.inputs.port }}:${{ github.event.inputs.port }} multiplayer-server:${{ github.event.inputs.image_tag }} --port ${{ github.event.inputs.port }}"
          
          if [ "${{ github.event.inputs.enable_logging }}" = "true" ]; then
            CMD="$CMD --logging-host ${{ github.event.inputs.logging_host }} --logging-port ${{ github.event.inputs.logging_port }}"
          fi
          
          echo "To run the server on your Synology NAS, pull the image from your registry and use:"
          echo "$CMD"

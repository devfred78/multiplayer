name: Build Synology-Compatible Docker Image

on:
  workflow_dispatch:
    inputs:
      port:
        description: 'Game server listening port'
        required: true
        default: '65432'
      enable_logging:
        description: 'Enable sending logs to a centralized server'
        type: boolean
        default: false
      logging_host:
        description: 'Log server address (if enabled)'
        required: false
      logging_port:
        description: 'Log server port (if enabled)'
        required: false
        default: '5000'
      image_tag:
        description: 'Docker image tag'
        required: true
        default: 'synology-latest'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/multiplayer-server:${{ github.event.inputs.image_tag }}
            ghcr.io/${{ github.repository_owner }}/multiplayer-server:synology-latest

      - name: Verify build and Show Run Command
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/multiplayer-server:${{ github.event.inputs.image_tag }}"
          echo "Multi-arch image build and push completed."
          echo "Image: $IMAGE"
          
          CMD="docker run -d -p ${{ github.event.inputs.port }}:${{ github.event.inputs.port }} $IMAGE --port ${{ github.event.inputs.port }}"
          
          if [ "${{ github.event.inputs.enable_logging }}" = "true" ]; then
            CMD="$CMD --logging-host ${{ github.event.inputs.logging_host }} --logging-port ${{ github.event.inputs.logging_port }}"
          fi
          
          echo "To run the server on your Synology NAS, pull the image and use:"
          echo "$CMD"

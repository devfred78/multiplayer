name: Update Tags in Workflows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  update-tags:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Get sorted tags
        id: get_tags
        run: |
          # Get tags starting with v, sorted by version descending
          TAGS=$(git tag --list 'v*' --sort=-v:refname | head -n 15)
          LATEST_TAG=$(echo "$TAGS" | head -n 1)
          
          # Escape newlines for GITHUB_OUTPUT
          OPTIONS_STRING=""
          for tag in $TAGS; do
            OPTIONS_STRING="${OPTIONS_STRING}          - $tag%0A"
          done
          
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "options_string=$OPTIONS_STRING" >> $GITHUB_OUTPUT

      - name: Update config file
        shell: bash
        run: |
          LATEST_TAG_VAL="${{ steps.get_tags.outputs.latest_tag }}"
          OPTIONS_VAL="${{ steps.get_tags.outputs.options_string }}"
          
          # Convert OPTIONS_VAL back to proper YAML format
          CLEAN_OPTIONS=$(echo -e "${OPTIONS_VAL//%0A/\\n}" | sed 's/^[[:space:]]*//')
          
          cat > .github/image-tags.yml << EOF
          latest_tag: $LATEST_TAG_VAL
          image_tags:
          $(echo -e "$CLEAN_OPTIONS")
          EOF

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .github/image-tags.yml
          git commit -m "docs: update image tags config [skip ci]" || echo "No changes to commit"
          git push origin main

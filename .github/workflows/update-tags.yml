name: Update Tags in Workflows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  update-tags:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Get sorted tags
        id: get_tags
        run: |
          # Get tags starting with v, sorted by version descending
          TAGS=$(git tag --list 'v*' --sort=-v:refname | head -n 15)
          LATEST_TAG=$(echo "$TAGS" | head -n 1)
          
          # Escape newlines for GITHUB_OUTPUT
          OPTIONS_STRING=""
          for tag in $TAGS; do
            OPTIONS_STRING="${OPTIONS_STRING}          - $tag%0A"
          done
          
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "options_string=$OPTIONS_STRING" >> $GITHUB_OUTPUT

      - name: Update workflows
        shell: bash
        run: |
          LATEST_TAG_VAL="${{ steps.get_tags.outputs.latest_tag }}"
          OPTIONS_VAL="${{ steps.get_tags.outputs.options_string }}"
          
          FILES=(".github/workflows/docker-build.yml" ".github/workflows/synology-docker-build.yml")
          
          for file in "${FILES[@]}"; do
            echo "Updating $file..."
            
            # Export variables to environment for Python
            export CURRENT_FILE="$file"
            export LATEST_TAG="$LATEST_TAG_VAL"
            export OPTIONS_TEXT="$OPTIONS_VAL"
            
            # Use python for reliable multiline replacement in YAML
            python3 -c "import re, os; f_path=os.environ['CURRENT_FILE']; l_tag=os.environ['LATEST_TAG']; o_text=os.environ['OPTIONS_TEXT'].replace('%0A', '\n').strip(); content=open(f_path).read(); content=re.sub(r'(image_tag:.*?options:)\n(\s+- v.*\n?)+', r'\1\n' + o_text + '\n', content, flags=re.DOTALL); content=re.sub(r'(image_tag:.*?default:)\s+\'v.*\'', r'\1 \'' + l_tag + '\'', content, flags=re.DOTALL); open(f_path, 'w').write(content)"
          done

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .github/workflows/docker-build.yml .github/workflows/synology-docker-build.yml
          git commit -m "docs: update image_tag options in workflows [skip ci]" || echo "No changes to commit"
          git push origin main
